services:
  # PostgreSQL Database
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: biomarker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (AOF persistence for durability)
  redis:
    image: redis:6-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Alembic migrations (one-shot; run before app servers)
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    working_dir: /app
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biomarker_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biomarker_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - SECRET_KEY=dev-docker-compose-secret-not-the-default-placeholder
      - DEBUG=False
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    command: celery -A app.services.celery_service:celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biomarker_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - SECRET_KEY=dev-docker-compose-secret-not-the-default-placeholder
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_data:/app/data

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    command: celery -A app.services.celery_service:celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biomarker_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - SECRET_KEY=dev-docker-compose-secret-not-the-default-placeholder
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_data:/app/data

  # Flower (Celery Monitoring)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    command: celery -A app.services.celery_service:celery_app flower --port=5555
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biomarker_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - SECRET_KEY=dev-docker-compose-secret-not-the-default-placeholder
    ports:
      - "5555:5555"
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  # Nginx (Reverse Proxy) - Commented out for now, frontend has its own nginx
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./nginx/ssl:/etc/nginx/ssl
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  default:
    driver: bridge