name: Real Data Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test-real-data:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libssl-dev \
          libffi-dev \
          python3-dev
    
    - name: Install Python dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Download real data
      working-directory: backend
      run: |
        python scripts/download_real_data_using_all_collectors.py
    
    - name: Verify real data files
      working-directory: backend
      run: |
        if [ -d "tests/fixtures/real_data" ]; then
          echo "Real data directory exists"
          ls -lh tests/fixtures/real_data/*.csv 2>/dev/null || echo "No CSV files found"
        else
          echo "Real data directory not found"
        fi
    
    - name: Run real data unit tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        CELERY_BROKER_URL: redis://localhost:6379/0
      run: |
        pytest tests/unit/test_with_real_data.py \
          tests/unit/test_real_data_expanded.py \
          -v \
          --tb=short \
          --maxfail=5 \
          --continue-on-collection-errors
    
    - name: Run real data integration tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        CELERY_BROKER_URL: redis://localhost:6379/0
      run: |
        pytest tests/integration/test_real_services.py \
          tests/integration/test_real_data_expanded.py \
          -v \
          --tb=short \
          --maxfail=5 \
          --continue-on-collection-errors
    
    - name: Generate coverage report
      working-directory: backend
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/unit/test_with_real_data.py \
          tests/unit/test_real_data_expanded.py \
          --cov=app \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term \
          --cov-fail-under=70
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      with:
        file: ./backend/coverage.xml
        flags: real_data_tests
        name: real-data-coverage
        fail_ci_if_error: false
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results
        path: |
          backend/htmlcov/
          backend/coverage.xml
          backend/.pytest_cache/
    
    - name: Report test status
      if: always()
      run: |
        echo "## Real Data Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Tests completed with real data from:" >> $GITHUB_STEP_SUMMARY
        echo "- TCGA" >> $GITHUB_STEP_SUMMARY
        echo "- GEO" >> $GITHUB_STEP_SUMMARY
        echo "- COSMIC" >> $GITHUB_STEP_SUMMARY
        echo "- ICGC" >> $GITHUB_STEP_SUMMARY
        echo "- ClinVar" >> $GITHUB_STEP_SUMMARY
        echo "- OncoKB" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All tests use actual real-world data - no mocks, no fakes." >> $GITHUB_STEP_SUMMARY
