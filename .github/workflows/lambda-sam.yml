# Optional: package backend + validate SAM template. Uncomment deploy job when AWS creds are ready.

name: Lambda SAM CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deployment/serverless/**"
      - ".github/workflows/lambda-sam.yml"

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend + Mangum (Lambda adapter)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt mangum

      - name: Smoke tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production-use-32b
          DEBUG: "true"
        run: |
          pip install -r requirements-dev.txt
          pytest tests/integration/test_api_surface.py tests/unit/test_run_access.py -q --tb=short

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          version: "1.110.0"

      - name: SAM validate
        working-directory: deployment/serverless
        run: sam validate -t template.yaml

