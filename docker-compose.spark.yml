# Optional Apache Spark for large-scale / distributed preprocessing.
# Usage: docker compose -f docker-compose.yml -f docker-compose.spark.yml up -d
#
# Workers connect to spark://spark-master:7077 from app code or separate jobs.
# See services/spark_jobs/README.md for job submission patterns.

services:
  spark-master:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
