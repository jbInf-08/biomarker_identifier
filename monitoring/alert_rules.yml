groups:
  - name: biomarker-identifier-alerts
    rules:
      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second for the last 5 minutes"

      # High Response Time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds"

      # Database / Redis exporters (enable when postgres-exporter / redis-exporter are deployed)
      # - alert: DatabaseConnectionFailure
      #   expr: up{job="postgres"} == 0
      # - alert: RedisConnectionFailure
      #   expr: up{job="redis"} == 0

      # Node exporter (optional)
      # - alert: HighMemoryUsage
      #   expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
      # - alert: HighCPUUsage
      #   expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
      # - alert: LowDiskSpace
      #   expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1

      # Celery exporter (optional) — uncomment when celery-exporter is deployed
      # - alert: CeleryWorkerDown
      #   expr: up{job="celery"} == 0
      # - alert: HighCeleryQueueLength
      #   expr: celery_queue_length > 1000

      # Backend Service Down
      - alert: BackendServiceDown
        expr: up{job="biomarker-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Backend API service is not responding"

      # Nginx exporter (optional)
      # - alert: FrontendServiceDown
      #   expr: up{job="nginx"} == 0

      # Postgres exporter (optional)
      # - alert: HighDatabaseConnections
      #   expr: pg_stat_database_numbackends > 80
      # - alert: SlowDatabaseQueries
      #   expr: rate(pg_stat_database_tup_returned[5m]) < 100

      # Redis exporter (optional)
      # - alert: HighRedisMemoryUsage
      #   expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8

      # Failed Analysis Runs
      - alert: HighAnalysisFailureRate
        expr: rate(analysis_runs_failed_total[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High analysis failure rate"
          description: "Analysis failure rate is {{ $value }} failures per second"

      # Long Running Analysis
      - alert: LongRunningAnalysis
        expr: analysis_runs_duration_seconds > 3600
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Long running analysis detected"
          description: "Analysis has been running for {{ $value }} seconds"

      # API Rate Limiting
      - alert: APIRateLimitExceeded
        expr: rate(http_requests_total{status="429"}[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API rate limit exceeded"
          description: "Rate limit exceeded {{ $value }} times per second"

      # Blackbox / cert exporter (optional)
      # - alert: SSLCertificateExpiry
      #   expr: (ssl_certificate_expiry_timestamp_seconds - time()) / 86400 < 30
