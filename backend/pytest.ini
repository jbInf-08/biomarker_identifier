[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    # sklearn: expected in error-path / degenerate-fold CV tests (single-class y_true)
    ignore:Scoring failed:UserWarning:sklearn.model_selection._validation
    # pandas: log2 on NaN/inf in edge-case matrices (tests still assert behavior)
    ignore:invalid value encountered in log2:RuntimeWarning:pandas.core.internals.blocks
    # SWIG / native bindings (e.g. optional scientific stacks)
    ignore:.*swigvarlink.*:DeprecationWarning
markers =
    slow: long-running tests
    integration: integration tests
    e2e: hits a running server at localhost (run after docker compose up)
