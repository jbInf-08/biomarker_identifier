version: '3.8'

services:
  # Redis for real testing
  redis-test:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PostgreSQL for real database testing
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Celery worker for real task testing
  celery-worker-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      - redis-test
      - postgres-test
    environment:
      REDIS_URL: redis://redis-test:6379/0
      DATABASE_URL: postgresql://test_user:test_password@postgres-test:5432/test_db
    volumes:
      - .:/app
